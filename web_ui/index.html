<!--
  File: index.html
  Author: Margarita Schemel
  This is the entry point for the basic web UI that talks to the C++
  MatchingEngine over HTTP. It renders simple forms for placing and
  cancelling orders, plus views for the order book, order counts and
  executed trades.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Stock Trading Machine</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <div class="title">Stock Trading Machine</div>
        <div class="subtitle">Local web UI (C++ backend)</div>
      </div>
      <div class="status" id="status">Connecting…</div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Place order</h2>
        <form id="placeForm" class="form">
          <label>
            <span>Ticker</span>
            <input name="ticker" placeholder="AAPL" required />
          </label>
          <label>
            <span>Side</span>
            <select name="side" required>
              <option value="buy">buy</option>
              <option value="sell">sell</option>
            </select>
          </label>
          <label>
            <span>Type</span>
            <select name="type" id="orderType" required>
              <option value="limit">limit</option>
              <option value="market">market</option>
            </select>
          </label>
          <label id="priceRow">
            <span>Price (cents)</span>
            <input name="price" type="number" step="1" min="1" placeholder="e.g. 35400 = $354.00" />
          </label>
          <label>
            <span>Quantity</span>
            <input name="quantity" type="number" min="1" step="1" placeholder="Enter quantity" required />
          </label>
          <button type="submit">Submit</button>
        </form>

        <div class="log" id="placeResult"></div>
      </section>

      <section class="card">
        <h2>Cancel order</h2>
        <form id="cancelForm" class="form">
          <label>
            <span>Order ID</span>
            <input name="orderId" type="number" min="1" step="1" required />
          </label>
          <button type="submit">Cancel</button>
        </form>
        <div class="log" id="cancelResult"></div>
      </section>

      <section class="card">
        <div class="row">
          <h2>Order book</h2>
          <button id="refreshBook">Refresh</button>
        </div>
        <div class="row">
          <label class="inline">
            <span>Ticker</span>
            <input id="bookTicker" placeholder="AAPL" />
          </label>
          <label class="inline">
            <span>Levels</span>
            <input id="bookLevels" type="number" min="1" max="20" value="5" />
          </label>
        </div>
        <div class="mono" id="bookView"></div>
      </section>

      <section class="card">
        <div class="row">
          <h2>Order Counts</h2>
          <button id="refreshStats">Refresh</button>
        </div>
        <div class="mono" id="statsView"></div>
      </section>

      <section class="card">
        <div class="row">
          <h2>Trades</h2>
          <div class="row-right">
            <label class="inline">
              <span>Auto refresh</span>
              <input id="autoTrades" type="checkbox" checked />
            </label>
            <button id="refreshTrades">Refresh</button>
          </div>
        </div>
        <div class="mono" id="tradesView"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
